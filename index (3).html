<style>
  :root{
    --bg:#0A0A0A;
    --ikb:#002FA8;
    --ink:#F4F4F2;
    --ink-mut:#8A8A86;
    --accent:#C8884A;
    --s1:8px; --s2:13px; --s3:21px; --s4:34px; --s5:55px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter Tight',system-ui,-apple-system,sans-serif;
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    align-items:center; text-align:center;
    overflow:hidden; position:relative;
  }
  body::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 50% 38%, rgba(0,47,168,0.30), rgba(0,47,168,0.05) 45%, transparent 68%);
    pointer-events:none;
  }
  .stage{
    position:relative; z-index:1; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:var(--s4) var(--s3);
    animation:rise 1.2s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .logo{
    width:min(26vh,240px); height:auto;
    filter:drop-shadow(0 0 30px rgba(0,47,168,0.8)) drop-shadow(0 0 10px rgba(0,47,168,0.55));
    animation:breathe 6s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.92;transform:scale(1)}50%{opacity:1;transform:scale(1.012)}}
  h1{margin-top:var(--s5);font-weight:500;font-size:clamp(24px,4.6vw,42px);letter-spacing:.04em;line-height:1.05}
  .tag{margin-top:var(--s2);color:var(--ink-mut);font-weight:300;font-size:clamp(12px,2.3vw,15px);letter-spacing:.16em;text-transform:uppercase}
  .founders-label{margin-top:var(--s4);color:var(--ink-mut);font-weight:300;font-size:clamp(10px,1.9vw,12px);letter-spacing:.22em;text-transform:uppercase}
  .founders{margin-top:var(--s1);color:var(--ink);font-weight:400;font-size:clamp(14px,2.6vw,17px);letter-spacing:.05em;opacity:.92}
  .soon{margin-top:var(--s4);display:inline-flex;align-items:center;gap:9px;color:var(--accent);font-weight:400;font-size:clamp(12px,2.4vw,14px);letter-spacing:.22em;text-transform:uppercase}
  .soon::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .contact{margin-top:var(--s4);font-weight:300;font-size:clamp(13px,2.3vw,15px);letter-spacing:.04em}
  .contact a{color:var(--ink);text-decoration:none;border-bottom:1px solid rgba(200,136,74,0.4);padding-bottom:1px;transition:border-color .3s ease,color .3s ease}
  .contact a:hover{color:var(--accent);border-color:var(--accent)}
  .copyright{position:absolute;bottom:var(--s3);left:0;right:0;z-index:1;color:var(--ink-mut);font-weight:300;font-size:11px;letter-spacing:.08em;opacity:.5}
  @media (max-height:560px){
    .logo{width:min(20vh,150px)}
    h1{margin-top:var(--s4)}
    .founders-label,.soon,.contact{margin-top:var(--s3)}
  }
</style>
</head>
